experiment_name: clean_customcnn
dataset_root: Rice Leaf Disease Images
manifest_root: outputs/manifests
output_root: outputs
dataset_view: clean
model_name: custom_cnn
img_size: 224
batch_size: 64
num_workers: 0
optimizer: adamw
lr: 0.001
weight_decay: 0.0001
dropout: 0.30
label_smoothing: 0.03
freeze_epochs: 0
finetune_epochs: 20
early_stopping_patience: 5
scheduler_patience: 2
min_delta: 0.0005
seed: 42
device: auto
amp: auto
use_pretrained: false
allow_pretrained_fallback: true
train_split: train
val_split: validation
test_split: test
eval_after_train: true
class_names:
  - Bacterialblight
  - Blast
  - Brownspot
  - Tungro
